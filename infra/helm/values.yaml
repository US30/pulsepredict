replicaCount: 1

image:
  api:
    repository: pulsepredict-api
    tag: latest
    pullPolicy: IfNotPresent
  worker:
    repository: pulsepredict-worker
    tag: latest
    pullPolicy: IfNotPresent

service:
  api:
    port: 8000
    type: ClusterIP
  worker: {}

postgresql:
  enabled: true
  auth:
    database: pulsepredict
    username: pulsepredict
    password: changeme

redis:
  enabled: true
  auth:
    enabled: false

resources:
  api:
    requests:
      memory: 512Mi
      cpu: 250m
    limits:
      memory: 2Gi
      cpu: 1000m
  worker:
    requests:
      memory: 2Gi
      cpu: 500m
    limits:
      memory: 8Gi
      cpu: 2000m
      nvidia.com/gpu: "1"

env:
  api:
    - name: CELERY_BROKER_URL
      value: redis://pulsepredict-redis-master:6379/1
    - name: CELERY_RESULT_BACKEND
      value: redis://pulsepredict-redis-master:6379/2
    - name: DATABASE_URL
      value: postgresql+psycopg2://pulsepredict:changeme@pulsepredict-postgresql:5432/pulsepredict

autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 4
  targetCPUUtilizationPercentage: 70
